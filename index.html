<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Для однієї особливої дівчини 🌷</title>
  <style>
    :root {
      --primary: #ff5f7e;
      --primary-dark: #ff3b60;
    }
    body {
      margin: 0;
      height: 100vh;
      height: calc(var(--vh, 1vh) * 100);
      background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fecfef);
      background-size: 300% 300%;
      animation: gradientBG 10s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #4a4a4a;
      text-align: center;
      overflow: hidden;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .card {
      width: 88%;
      max-width: 380px;
      padding: 35px 25px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.75);
      box-shadow: 0 15px 35px rgba(255, 110, 130, 0.25);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-sizing: border-box;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    h1 {
      font-size: 26px;
      color: #d14160;
      margin-top: 0;
      margin-bottom: 20px;
      font-weight: 700;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      white-space: pre-line;
      margin-bottom: 25px;
      color: #5a5556;
    }
    .input-group {
      margin-bottom: 20px;
    }
    input {
      width: 80%;
      padding: 12px 20px;
      border: 2px solid #ffccd5;
      border-radius: 25px;
      font-size: 16px;
      text-align: center;
      outline: none;
      transition: 0.3s;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(255, 95, 126, 0.2);
    }
    .btn-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      position: relative;
      min-height: 55px;
      align-items: center;
    }
    button {
      padding: 14px 28px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255, 110, 130, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active {
      transform: scale(0.95);
    }
    button.secondary {
      background: #fff;
      color: #999;
      border: 1px solid #ddd;
      box-shadow: none;
    }
    #btn-no {
      position: relative;
      transition: all 0.2s ease;
    }
    .falling {
      position: absolute;
      top: -40px;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 10;
    }
    @keyframes fall {
      to {
        transform: translateY(115vh) rotate(360deg);
        opacity: 0;
      }
    }
    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Крок 0: Загадка/Пароль -->
  <div class="card" id="main-card">
    <div id="content-box" class="fade-in">
      <h1 id="title">🔐 Доступ обмежено</h1>
      <p id="text">Ця сторінка створена для однієї неймовірної дівчини. <br>Щоб увійти, введіть її ім'я (з великої літери):</p>
      <div id="interactive-area">
        <div class="input-group">
          <input type="text" id="name-input" placeholder="Як її звати? 😊">
        </div>
        <button onclick="checkPassword()">Увійти</button>
      </div>
    </div>
  </div>

  <script>
    // Мобільний фікс висоти
    function resetHeight() {
      document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    }
    window.addEventListener('resize', resetHeight);
    resetHeight();

    let currentStep = 0;
    
    // Сюжетна лінія
    const story = [
      {
        title: "Привіт, Аню! 👋✨",
        text: "Ти розгадала пароль! Ну звісно, адже цей сюрприз саме для тебе.\n\nУ мене є кілька секунд твоєї уваги?",
        type: "buttons",
        yesText: "Так, звісно 🥰",
        noText: "Ні 😜",
        hasPrank: true
      },
      {
        title: "Чудово! Тоді слухай... 🤫",
        text: "Насправді у цьому світі є мільйони речей, які викликають усмішку.\n\nАле знаєш, чия посмішка на першому місці?",
        type: "single",
        btnText: "Чия? 👀"
      },
      {
        title: "Твоя! 😍",
        text: "Ти неймовірно гарна, Аню. Коли ти посміхаєшся, навколо стає якось... тепліше і затишніше. \n\nЦе твій перший секрет.",
        type: "single",
        btnText: "Ой, як приємно... Далі? ✨"
      },
      {
        title: "Секрет №2 💭",
        text: "Іноді я ловлю себе на думці, що коли бачу щось цікаве, смішне або красиве ...\n\nПерша думка в голові: «Треба терміново надіслати це Ані!»",
        type: "single",
        btnText: "Справді? 🥺"
      },
      {
        title: "Так, саме так! 😊",
        text: "Бо ділитися емоціями саме з тобою — це особливе задоволення. Мені завжди щиро цікаво знати, як пройшов твій день.",
        type: "single",
        btnText: "Ти мене заінтригував..."
      },
      {
        title: "Головний секрет... 🌹",
        text: "Ти стала для мене дуже важливою та особливою людиною.\n\nГотова дізнатися фінальну таємницю?",
        type: "single",
        btnText: "Готова! ❤️"
      },
      {
        title: "Для тебе, Аню ❤️",
        text: "Мені просто неймовірно подобається, що ти є в моему житті. Саме така як ти є — щира, чарівна і справжня. \n\nЦі квіти і зірки падають лише для тебе! 🌷✨",
        type: "final"
      }
    ];

    function updateCard(data) {
      const content = document.getElementById("content-box");
      content.classList.remove("fade-in");
      void content.offsetWidth; // Трюк для перезапуску анімації
      content.classList.add("fade-in");

      document.getElementById("title").innerText = data.title;
      document.getElementById("text").innerText = data.text;
      
      const area = document.getElementById("interactive-area");
      area.innerHTML = ""; // Очищення старого інтерактиву

      if (data.type === "single") {
        area.innerHTML = `<button onclick="nextStoryStep()">${data.btnText}</button>`;
      } else if (data.type === "buttons") {
        area.innerHTML = `
          <div class="btn-container">
            <button onclick="nextStoryStep()">${data.yesText}</button>
            <button id="btn-no" class="secondary" onmouseover="moveNoButton()" onclick="moveNoButton()">${data.noText}</button>
          </div>
        `;
      } else if (data.type === "final") {
        document.body.style.background = "linear-gradient(45deg, #ff758c, #ff7eb3, #ef709b)";
        startMagicDrop();
      }
    }

    function checkPassword() {
      const input = document.getElementById("name-input").value.trim();
      if (input === "Аня" || input === "Анна" || input === "Ганна" || input === "Анечка" || input === "Анюта") {
        updateCard(story[currentStep]);
      } else if (input.toLowerCase() === "аня") {
        alert("Майже! Напиши, будь ласка, з великої літери 😊");
      } else {
        alert("Хмм, спробуй ще раз! Підказка: ім'я починається на 'А' 😉");
      }
    }

    function nextStoryStep() {
      currentStep++;
      if (currentStep < story.length) {
        updateCard(story[currentStep]);
      }
    }

    // Тікаюча кнопка "Ні" (для телефону працює по кліку, для ПК по наведенню)
    function moveNoButton() {
      const btnNo = document.getElementById("btn-no");
      if (!btnNo) return;
      
      // Випадкове зміщення в межах екрану, але близько до картки
      const x = (Math.random() - 0.5) * 200;
      const y = (Math.random() - 0.5) * 150;
      
      btnNo.style.transform = `translate(${x}px, ${y}px)`;
      
      // Невеликий жарт у тексті, якщо вона намагається натиснути "Ні"
      const phrases = ["Ой!", "Куди?", "Неа 😜", "Тут зачинено", "Спробуй 'Так'"];
      btnNo.innerText = phrases[Math.floor(Math.random() * phrases.length)];
    }

    // Романтичний фінальний ефект
    function startMagicDrop() {
      const items = ["❤️", "🌷", "✨", "🌸", "💖", "🌟"];
      setInterval(() => {
        const drop = document.createElement("div");
        drop.className = "falling";
        drop.innerText = items[Math.floor(Math.random() * items.length)];
        drop.style.left = Math.random() * 100 + "vw";
        drop.style.fontSize = (16 + Math.random() * 24) + "px";
        drop.style.animationDuration = (2.5 + Math.random() * 3) + "s";
        
        document.body.appendChild(drop);
        
        setTimeout(() => { drop.remove(); }, 5500);
      }, 200);
    }
  </script>
</body>
</html>
