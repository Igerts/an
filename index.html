
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Для тебе 🌷</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #9d3f45;
    }
    .container {
      width: 100%;
      min-height: 100vh;
      padding: 40px 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .card {
      width: 100%;
      max-width: 430px;
      padding: 42px 26px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 20px 60px rgba(255, 90, 120, 0.25);
      backdrop-filter: blur(12px);
      text-align: center;
      z-index: 2;
    }
    .big-heart {
      font-size: 54px;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 27px;
      margin: 0 0 24px;
      font-weight: 400;
    }
    p {
      font-size: 21px;
      line-height: 1.55;
      margin: 0;
      white-space: pre-line;
    }
    button {
      margin-top: 34px;
      padding: 16px 34px;
      border: none;
      border-radius: 40px;
      background: linear-gradient(135deg, #ff6f7d, #ff4f6d);
      color: white;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 12px 30px rgba(255, 79, 109, 0.35);
      cursor: pointer;
    }
    .heart {
      position: absolute;
      top: -40px;
      font-size: 28px;
      opacity: 0.45;
      animation: fall linear forwards;
      z-index: 1;
    }
    @keyframes fall {
      to {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
    @media (max-width: 480px) {
      .card {
        padding: 38px 22px;
      }
      h1 {
        font-size: 25px;
      }
      p {
        font-size: 20px;
      }
      button {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="big-heart">❤️</div>
      <h1 id="title">Наша малеча,</h1>
      <p id="text">мені просто дуже подобається,
що ти є в моєму житті.
🌷</p>
      <button id="button" onclick="nextStep()">Почати 💖</button>
    </div>
  </div>
  <script>
    const steps = [
      {
        title: "Секрет №1",
        text: "Ти гарна.",
        button: "Це весь секрет?"
      },
      {
        title: "Ні 😄",
        text: "Це був лише початок.",
        button: "Тоді далі"
      },
      {
        title: "Секрет №2",
        text: "Мені завжди цікаво,\nяк пройшов твій день.",
        button: "Ммм..."
      },
      {
        title: "Секрет №3",
        text: "Іноді бачу щось цікаве\nі ловлю себе на думці:\n\n«Треба їй це показати.»",
        button: "Ще є?"
      },
      {
        title: "Секрет №4",
        text: "Ти стала для мене\nдуже важливою людиною.",
        button: "Підозріло 🤔"
      },
      {
        title: "❤️",
        text: "Якщо чесно,\n\nмені просто дуже подобається,\nщо ти є в моєму житті.\n\n🌷",
        button: ""
      }
    ];
    let step = 0;
    function nextStep() {
      const title = document.getElementById("title");
      const text = document.getElementById("text");
      const button = document.getElementById("button");
      title.innerText = steps[step].title;
      text.innerText = steps[step].text;
      if (steps[step].button === "") {
        button.style.display = "none";
      } else {
        button.innerText = steps[step].button;
      }
      step++;
    }
    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerText = Math.random() > 0.5 ? "❤️" : "🤍";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = 5 + Math.random() * 5 + "s";
      heart.style.fontSize = 18 + Math.random() * 24 + "px";
      document.body.appendChild(heart);
      setTimeout(() => {
        heart.remove();
      }, 10000);
    }
    setInterval(createHeart, 500);
  </script>
</body>
</html>
