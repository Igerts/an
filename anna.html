Ось готовий HTML. Збережи як secret.html і відкрий у браузері.

<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Маленький секрет 🌷</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      overflow: hidden;
    }
    .card {
      width: 85%;
      max-width: 420px;
      padding: 35px 25px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(8px);
    }
    h1 {
      font-size: 30px;
      margin-bottom: 20px;
    }
    p {
      font-size: 20px;
      line-height: 1.5;
      white-space: pre-line;
    }
    button {
      margin-top: 25px;
      padding: 13px 24px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #ff5f7e;
      font-size: 17px;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
    .heart {
      position: absolute;
      top: -30px;
      font-size: 24px;
      animation: fall linear forwards;
      opacity: 0.8;
    }
    @keyframes fall {
      to {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">🌷 Маленький секрет</h1>
    <p id="text">Привіт 😊
Тут захований один секрет.</p>
    <button id="button" onclick="nextStep()">Відкрити секрет</button>
  </div>
  <script>
    const steps = [
      {
        title: "Секрет №1",
        text: "Ти гарна.",
        button: "Це весь секрет?"
      },
      {
        title: "Ні 😄",
        text: "Це був лише початок.",
        button: "Тоді далі"
      },
      {
        title: "Секрет №2",
        text: "Мені завжди цікаво,\nяк пройшов твій день.",
        button: "Ммм..."
      },
      {
        title: "Секрет №3",
        text: "Іноді бачу щось цікаве\nі ловлю себе на думці:\n\n«Треба їй це показати.»",
        button: "Ще є?"
      },
      {
        title: "Є 😊",
        text: "",
        button: "Розповідай"
      },
      {
        title: "Секрет №4",
        text: "Ти стала для мене\nдуже важливою людиною.",
        button: "Підозріло 🤔"
      },
      {
        title: "Добре",
        text: "Останній секрет.",
        button: "Останній?"
      },
      {
        title: "Так",
        text: "Останній.",
        button: "Відкрити"
      },
      {
        title: "❤️",
        text: "Якщо чесно,\n\nмені просто дуже подобається,\nщо ти є в моєму житті.\n\n🌷",
        button: "❤️"
      }
    ];
    let step = 0;
    function nextStep() {
      const title = document.getElementById("title");
      const text = document.getElementById("text");
      const button = document.getElementById("button");
      title.innerText = steps[step].title;
      text.innerText = steps[step].text;
      button.innerText = steps[step].button;
      if (step === steps.length - 1) {
        button.style.display = "none";
        startHearts();
      }
      step++;
    }
    function startHearts() {
      setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = 3 + Math.random() * 3 + "s";
        document.body.appendChild(heart);
        setTimeout(() => {
          heart.remove();
        }, 6000);
      }, 300);
    }
  </script>
</body>
</html>
